edition = 4

[agent]
name = "visual-agent"
version = "0.1.0"
description = "Final presentation pass (executable, lighter model). Preserves the verified draft's structure and citations, adds light editorial polish, identifies grounded visual-aid opportunities, and emits the output envelope to the conductor."
summary = "Final visual/presentation pass; emits output."
readme = "Executable Mastra agent. Worker owns wait_for_mention. Lighter model — presentation polish now; Replicate-backed visual asset generation later. OpenRouter-direct via MODEL_NAME."

[agent.license]
type = "spdx"
expression = "MIT"

# Smoke-test phase: all agents on deepseek-v4-pro (75% promo) to exercise
# thinking-model handling. Prior default: anthropic/claude-haiku-4.5.
# REASONING_EFFORT low keeps smoke runs fast while still round-tripping reasoning.
[options]
MODEL_NAME = { type = "string", default = "deepseek/deepseek-v4-pro" }
MODEL_BASE_URL = { type = "string", default = "https://openrouter.ai/api/v1" }
REASONING_EFFORT = { type = "string", default = "low" }

[runtimes.executable]
path = "bash"
arguments = ["startup.sh"]
transport = "streamable_http"
