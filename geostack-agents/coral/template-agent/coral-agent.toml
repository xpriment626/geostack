edition = 4

[agent]
name = "template-agent"
version = "0.1.0"
description = "Geostack final-pass formatter (executable runtime). Polishes content-agent's draft into a publication-ready post and ships the final envelope to the user."
summary = "Final formatter for Geostack newsletter posts."
readme = "Executable-runtime Mastra agent. Worker owns wait_for_mention; the LLM acts on one draft per turn. OpenRouter-direct via MODEL_NAME."

[agent.license]
type = "spdx"
expression = "MIT"

[options]
MODEL_NAME = { type = "string", default = "anthropic/claude-haiku-4.5" }
MODEL_BASE_URL = { type = "string", default = "https://openrouter.ai/api/v1" }

[runtimes.executable]
path = "bash"
arguments = ["startup.sh"]
transport = "streamable_http"
