edition = 4

[agent]
name = "brief-agent"
version = "0.1.0"
description = "Geostack wizard host + pipeline orchestrator (executable runtime). Phase 1: runs a structured wizard with the user and emits a brief. Phase 2: on approval, creates the pipeline thread and fans out to search + thumbnail."
summary = "Wizard + orchestrator for Geostack."
readme = "Executable-runtime Mastra agent. Worker owns wait_for_mention; the LLM acts on one mention per turn. OpenRouter-direct via MODEL_NAME."

[agent.license]
type = "spdx"
expression = "MIT"

# Swap the model for a cost:capability trial by changing MODEL_NAME — any
# OpenRouter id. Defaults reproduce the demo baseline (Haiku for the
# protocol-disciplined wizard/orchestrator role).
[options]
MODEL_NAME = { type = "string", default = "anthropic/claude-haiku-4.5" }
MODEL_BASE_URL = { type = "string", default = "https://openrouter.ai/api/v1" }

[runtimes.executable]
path = "bash"
arguments = ["startup.sh"]
transport = "streamable_http"
