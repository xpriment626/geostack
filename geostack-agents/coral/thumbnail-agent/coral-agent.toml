edition = 4

[agent]
name = "thumbnail-agent"
version = "0.1.0"
description = "Geostack thumbnail concept + image prompt (executable runtime). Reads a brief and emits a thumbnail_prompt envelope; the frontend invokes Replicate's gpt-image-2."
summary = "Thumbnail concept + image prompt for Geostack."
readme = "Executable-runtime Mastra agent. Worker owns wait_for_mention; the LLM acts on one brief per turn. OpenRouter-direct via MODEL_NAME."

[agent.license]
type = "spdx"
expression = "MIT"

[options]
MODEL_NAME = { type = "string", default = "openai/gpt-5.4-mini" }
MODEL_BASE_URL = { type = "string", default = "https://openrouter.ai/api/v1" }

[runtimes.executable]
path = "bash"
arguments = ["startup.sh"]
transport = "streamable_http"
