edition = 4

[agent]
name = "strategist-agent"
version = "0.1.0"
description = "GEO-strategy core (executable, strong model). Ingests the structurally-collapsed research artifact and produces a GEO strategy: angle, citation targets, structure, and the claim→source map. Does NOT write prose — hands the plan to the writer."
summary = "GEO strategy: angle, citation targets, structure."
readme = "Executable Mastra agent. Worker owns wait_for_mention. Strong model — strategy quality is the lever for citation-worthiness. OpenRouter-direct via MODEL_NAME."

[agent.license]
type = "spdx"
expression = "MIT"

# Smoke-test phase: deepseek-v4-pro (75% promo) to exercise thinking-model
# handling. Strategy benefits from reasoning — REASONING_EFFORT can go
# medium/high when quality matters; low for smoke.
[options]
MODEL_NAME = { type = "string", default = "deepseek/deepseek-v4-pro" }
MODEL_BASE_URL = { type = "string", default = "https://openrouter.ai/api/v1" }
REASONING_EFFORT = { type = "string", default = "low" }

[runtimes.executable]
path = "bash"
arguments = ["startup.sh"]
transport = "streamable_http"
