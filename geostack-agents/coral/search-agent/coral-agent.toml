edition = 4

[agent]
name = "search-agent"
version = "0.1.0"
description = "Geostack research enrichment (executable runtime). Reads a brief, runs Exa web searches, and posts a research-enriched brief for content-agent."
summary = "Research enrichment for Geostack — Exa-backed web search."
readme = "Executable-runtime Mastra agent with Exa MCP tools. Worker owns wait_for_mention; the LLM acts on one brief per turn. OpenRouter-direct via MODEL_NAME."

[agent.license]
type = "spdx"
expression = "MIT"

[options]
MODEL_NAME = { type = "string", default = "openai/gpt-5.4-mini" }
MODEL_BASE_URL = { type = "string", default = "https://openrouter.ai/api/v1" }

[runtimes.executable]
path = "bash"
arguments = ["startup.sh"]
transport = "streamable_http"
