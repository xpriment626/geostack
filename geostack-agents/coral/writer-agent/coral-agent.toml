edition = 4

[agent]
name = "writer-agent"
version = "0.1.0"
description = "Content-production core (executable, strong model). Executes the strategist's GEO plan into a citation-dense, machine-parseable draft, grounding every claim in the research artifact's real sources. Revises on grounding feedback."
summary = "GEO content production — executes the strategy into a grounded draft."
readme = "Executable Mastra agent. Worker owns wait_for_mention. Strong model for prose quality + faithful grounding. OpenRouter-direct via MODEL_NAME."

[agent.license]
type = "spdx"
expression = "MIT"

# Smoke-test phase: deepseek-v4-pro (75% promo) to exercise thinking-model
# handling. Prior strong default for the merged synthesis lane: claude-sonnet-4.6.
[options]
MODEL_NAME = { type = "string", default = "deepseek/deepseek-v4-pro" }
MODEL_BASE_URL = { type = "string", default = "https://openrouter.ai/api/v1" }
REASONING_EFFORT = { type = "string", default = "low" }

[runtimes.executable]
path = "bash"
arguments = ["startup.sh"]
transport = "streamable_http"
